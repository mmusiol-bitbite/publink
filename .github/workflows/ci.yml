name: quality-gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'
      - run: dotnet restore src/backend/Publink.Audit.sln
      - run: dotnet format src/backend/Publink.Audit.sln --verify-no-changes --no-restore
      - run: dotnet build src/backend/Publink.Audit.sln --configuration Release --no-restore
      - run: dotnet test src/backend/Publink.Audit.sln --configuration Release --no-build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  compose:
    name: Container build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker/docker-compose.yml config --quiet
      - run: docker compose -f docker/docker-compose.yml build
