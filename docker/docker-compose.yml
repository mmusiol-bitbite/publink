name: publink-audit

x-backend-environment: &backend-environment
  ConnectionStrings__ReadModel: "Server=mssql,1433;Initial Catalog=AuditReadModel;User Id=sa;Password=${MSSQL_SA_PASSWORD};Encrypt=False;TrustServerCertificate=True"
  ConnectionStrings__Archive: "Server=mssql,1433;Initial Catalog=AuditArchive;User Id=sa;Password=${MSSQL_SA_PASSWORD};Encrypt=False;TrustServerCertificate=True"
  ConnectionStrings__ServiceBus: "${AUDIT_SERVICE_BUS_CONNECTION}"
  ConnectionStrings__ServiceBusAdministration: "${AUDIT_SERVICE_BUS_ADMIN_CONNECTION}"

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q 'SELECT 1' || exit 1"
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    environment:
      ACCEPT_EULA: "Y"
      SQL_SERVER: mssql
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      EMULATOR_HTTP_PORT: "5300"
      SQL_WAIT_INTERVAL: "20"
    volumes:
      - ./servicebus/Config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    ports:
      - "5672:5672"
      - "5300:5300"
    depends_on:
      mssql:
        condition: service_healthy

  servicebus-ready:
    image: busybox:1.36
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    healthcheck:
      test:
        ["CMD-SHELL", "wget -T 3 -qO- http://servicebus-emulator:5300/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 180
      start_period: 5s
    restart: unless-stopped
    depends_on:
      servicebus-emulator:
        condition: service_started

  processing-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      args:
        PROJECT: Audit.Processing.Worker
    environment:
      <<: *backend-environment
    restart: on-failure
    depends_on:
      mssql:
        condition: service_healthy
      servicebus-ready:
        condition: service_healthy

  ingestion-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      args:
        PROJECT: Audit.Ingestion.Worker
    env_file:
      - path: ./.env.client
        required: false
    environment:
      <<: *backend-environment
      LegacyImport__PollingInterval: "01:00:00"
    restart: on-failure
    depends_on:
      mssql:
        condition: service_healthy
      servicebus-ready:
        condition: service_healthy
      processing-worker:
        condition: service_started

  archival-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      args:
        PROJECT: Audit.Archival.Worker
    environment:
      <<: *backend-environment
      Archival__InactivityMonths: "18"
      Archival__RunInterval: "00:05:00"
    restart: on-failure
    depends_on:
      mssql:
        condition: service_healthy
      ingestion-worker:
        condition: service_started

  query-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      args:
        PROJECT: Audit.Query.Api
    environment:
      <<: *backend-environment
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "8080:8080"
    restart: on-failure
    depends_on:
      mssql:
        condition: service_healthy
      servicebus-ready:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      query-api:
        condition: service_started

volumes:
  mssql-data:
